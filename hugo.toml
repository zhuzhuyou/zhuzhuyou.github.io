baseURL = "https://zhuzhuyou.github.io/"
locale = "zh-cn"
defaultContentLanguage = "zh"
title = "dd 的技术博客"
theme = "PaperMod"
enableRobotsTXT = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
env = "production"
description = "记录编程、工具、AI 与日常学习的个人技术博客。"
author = "dd"
defaultTheme = "auto"
DateFormat = "2006-01-02"
mainSections = ["posts"]
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
ShowRssButtonInSectionTermList = true
ShowFullTextinRSS = true

[params.homeInfoParams]
Title = "dd 的技术博客"
Content = "这里记录我在编程、工具、AI 和长期学习中的实践与思考。"

[[params.socialIcons]]
name = "github"
url = "https://github.com/zhuzhuyou"

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "archives"
name = "归档"
url = "/archives/"
weight = 10

[[menu.main]]
identifier = "search"
name = "搜索"
url = "/search/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "标签"
url = "/tags/"
weight = 30

[[menu.main]]
identifier = "about"
name = "关于"
url = "/about/"
weight = 40
